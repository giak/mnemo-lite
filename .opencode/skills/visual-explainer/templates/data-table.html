<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Fragment+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'Bricolage Grotesque', system-ui, sans-serif;
      --font-mono: 'Fragment Mono', 'SF Mono', Consolas, monospace;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface-elevated: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-bright: rgba(0, 0, 0, 0.15);
      --text: #1a1a2e;
      --text-dim: #6b7280;
      --accent: #0891b2;
      --accent-dim: rgba(8, 145, 178, 0.1);
      --green: #059669;
      --green-dim: rgba(5, 150, 105, 0.1);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.1);
      --orange: #d97706;
      --orange-dim: rgba(217, 119, 6, 0.1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface-elevated: #1c2333;
        --border: rgba(255, 255, 255, 0.06);
        --border-bright: rgba(255, 255, 255, 0.12);
        --text: #e6edf3;
        --text-dim: #8b949e;
        --accent: #22d3ee;
        --accent-dim: rgba(34, 211, 238, 0.12);
        --green: #34d399;
        --green-dim: rgba(52, 211, 153, 0.12);
        --red: #f87171;
        --red-dim: rgba(248, 113, 113, 0.12);
        --orange: #fbbf24;
        --orange-dim: rgba(251, 191, 36, 0.12);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      padding: 40px 24px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-dim); margin-bottom: 32px; font-size: 15px; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      line-height: 1.5;
    }
    .data-table thead { position: sticky; top: 0; z-index: 2; }
    .data-table th {
      background: var(--surface-elevated);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid var(--border-bright);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      color: var(--text);
    }
    .data-table tbody tr:nth-child(even) { background: var(--accent-dim); }
    .data-table tbody tr { transition: background 0.15s ease; }
    .data-table tbody tr:hover { background: var(--border); }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table code {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .data-table small {
      display: block;
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 2px;
    }
    .data-table .wide { min-width: 200px; max-width: 500px; }
    .data-table td.num, .data-table th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .status--match { background: var(--green-dim); color: var(--green); }
    .status--gap { background: var(--red-dim); color: var(--red); }
    .status--warn { background: var(--orange-dim); color: var(--orange); }

    @media (max-width: 768px) {
      body { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Comparison Table</h1>
    <p class="subtitle">Feature comparison across components</p>

    <div class="table-wrap">
      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>Feature</th>
              <th>Component A</th>
              <th>Component B</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Authentication</strong></td>
              <td><code>JWT</code><small>RS256 signing</small></td>
              <td><code>OAuth2</code><small>PKCE flow</small></td>
              <td><span class="status status--match">Implemented</span></td>
            </tr>
            <tr>
              <td><strong>Caching</strong></td>
              <td><code>Redis</code><small>TTL-based</small></td>
              <td>—</td>
              <td><span class="status status--warn">Partial</span></td>
            </tr>
            <tr>
              <td><strong>Rate Limiting</strong></td>
              <td>Token bucket</td>
              <td>Sliding window</td>
              <td><span class="status status--match">Implemented</span></td>
            </tr>
            <tr>
              <td><strong>Logging</strong></td>
              <td>Structured JSON</td>
              <td>—</td>
              <td><span class="status status--gap">Missing</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
