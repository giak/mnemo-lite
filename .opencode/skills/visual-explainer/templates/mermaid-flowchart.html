<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Diagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'Outfit', system-ui, sans-serif;
      --font-mono: 'Space Mono', 'SF Mono', Consolas, monospace;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-bright: rgba(0, 0, 0, 0.15);
      --text: #1a1a2e;
      --text-dim: #6b7280;
      --accent: #0891b2;
      --accent-dim: rgba(8, 145, 178, 0.1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: rgba(255, 255, 255, 0.06);
        --border-bright: rgba(255, 255, 255, 0.12);
        --text: #e6edf3;
        --text-dim: #8b949e;
        --accent: #22d3ee;
        --accent-dim: rgba(34, 211, 238, 0.12);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      padding: 40px 24px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-dim); margin-bottom: 32px; }

    .diagram-shell {
      position: relative;
    }
    .diagram-shell__hint {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      opacity: 0.7;
    }
    .mermaid-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 24px;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }
    .mermaid-viewport {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 100%;
      min-height: 300px;
    }
    .mermaid-canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    .zoom-controls {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 2px;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
    }
    .zoom-controls button {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .zoom-controls button:hover {
      background: var(--border);
      color: var(--text);
    }
    .zoom-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      padding: 0 6px;
      white-space: nowrap;
    }
    .mermaid-wrap { cursor: grab; }
    .mermaid-wrap.is-panning { cursor: grabbing; user-select: none; }

    .mermaid .nodeLabel { color: var(--text) !important; }
    .mermaid .edgeLabel { color: var(--text-dim) !important; background-color: var(--bg) !important; }
    .mermaid .edgeLabel rect { fill: var(--bg) !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Diagram Title</h1>
    <p class="subtitle">Description of what this diagram shows</p>

    <section class="diagram-shell">
      <p class="diagram-shell__hint">Ctrl/Cmd + wheel to zoom. Drag to pan. Double-click to fit.</p>
      <div class="mermaid-wrap">
        <div class="zoom-controls">
          <button type="button" data-action="zoom-in" title="Zoom in">+</button>
          <button type="button" data-action="zoom-out" title="Zoom out">&minus;</button>
          <button type="button" data-action="zoom-fit" title="Smart fit">&#8634;</button>
          <button type="button" data-action="zoom-one" title="1:1 zoom">1:1</button>
          <button type="button" data-action="zoom-expand" title="Open full size">&#x26F6;</button>
          <span class="zoom-label">Loading...</span>
        </div>
        <div class="mermaid-viewport">
          <div class="mermaid mermaid-canvas"></div>
        </div>
      </div>
      <script type="text/plain" class="diagram-source">
graph TD
  A[Client] --> B[API Gateway]
  B --> C[Auth Service]
  B --> D[Core Service]
  C --> E[(Database)]
  D --> E
  D --> F[(Cache)]
      </script>
    </section>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      look: 'classic',
      themeVariables: {
        primaryColor: isDark ? '#134e4a' : '#ccfbf1',
        primaryBorderColor: isDark ? '#14b8a6' : '#0d9488',
        primaryTextColor: isDark ? '#f0fdfa' : '#134e4a',
        secondaryColor: isDark ? '#1e293b' : '#f0fdf4',
        secondaryBorderColor: isDark ? '#059669' : '#16a34a',
        secondaryTextColor: isDark ? '#f1f5f9' : '#1e293b',
        tertiaryColor: isDark ? '#27201a' : '#fef3c7',
        tertiaryBorderColor: isDark ? '#d97706' : '#f59e0b',
        tertiaryTextColor: isDark ? '#fef3c7' : '#27201a',
        lineColor: isDark ? '#64748b' : '#94a3b8',
        fontSize: '16px',
        fontFamily: "'Outfit', system-ui, sans-serif",
      }
    });

    const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
    let activeDrag = null;

    addEventListener('mousemove', (e) => activeDrag?.onMove(e));
    addEventListener('mouseup', () => { activeDrag?.onEnd(); activeDrag = null; });

    function initDiagram(shell) {
      const wrap = shell.querySelector('.mermaid-wrap');
      const viewport = shell.querySelector('.mermaid-viewport');
      const canvas = shell.querySelector('.mermaid-canvas');
      const source = shell.querySelector('.diagram-source');
      const label = shell.querySelector('.zoom-label');
      if (!wrap || !viewport || !canvas || !source || !label) return;

      let zoom = 1, panX = 0, panY = 0;

      async function render() {
        try {
          const code = source.textContent.trim();
          if (!code) { label.textContent = 'Error: Empty source'; return; }
          const id = 'diagram-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
          const { svg } = await mermaid.render(id, code);
          canvas.innerHTML = svg;
          const svgEl = canvas.querySelector('svg');
          if (!svgEl) return;
          svgEl.style.width = '100%';
          svgEl.style.height = '100%';
          label.textContent = '100%';
        } catch (err) {
          label.textContent = 'Error: ' + (err.message || 'Render failed');
        }
      }

      wrap.querySelector('[data-action="zoom-in"]')?.addEventListener('click', () => {
        zoom = clamp(zoom * 1.2, 0.2, 5);
        canvas.querySelector('svg')?.style.setProperty('transform', `scale(${zoom}) translate(${panX/zoom}px, ${panY/zoom}px)`);
        label.textContent = Math.round(zoom * 100) + '%';
      });
      wrap.querySelector('[data-action="zoom-out"]')?.addEventListener('click', () => {
        zoom = clamp(zoom / 1.2, 0.2, 5);
        canvas.querySelector('svg')?.style.setProperty('transform', `scale(${zoom}) translate(${panX/zoom}px, ${panY/zoom}px)`);
        label.textContent = Math.round(zoom * 100) + '%';
      });
      wrap.querySelector('[data-action="zoom-expand"]')?.addEventListener('click', () => {
        const w = window.open();
        if (w) { w.document.write(canvas.innerHTML); w.document.close(); }
      });

      render();
    }

    document.querySelectorAll('.diagram-shell').forEach(initDiagram);
  </script>
</body>
</html>
