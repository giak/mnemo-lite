name: CI

on:
  push:
    branches: [main, migration/postgresql-18]
  pull_request:
    branches: [main]

jobs:
  test-mcp:
    name: MCP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose --profile dev up -d db redis

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if docker compose exec db pg_isready -U mnemo -q 2>/dev/null; then
              echo "DB ready"
              break
            fi
            sleep 2
          done

      - name: Run MCP tests
        run: docker compose exec api python -m pytest tests/mnemo_mcp/ -v --tb=short

      - name: Cleanup
        if: always()
        run: docker compose down

  type-check-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx vue-tsc --noEmit

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
