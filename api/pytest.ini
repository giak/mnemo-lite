[pytest]
testpaths = tests/mnemo_mcp tests/unit tests/integration
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    real_embeddings: marks tests that use real embedding models
    slow: marks tests as slow running
    e2e: marks tests as end-to-end (require playwright)

# Ignore tests requiring external deps not in CI environment
# - playwright (E2E browser tests)
# - opentelemetry (worker tests)
# - run_parallel_pipeline (deprecated script)
norecursedirs = tests/workers
addopts =
    --ignore=tests/integration/test_parallel_pipeline.py
    --ignore=tests/integration/test_story_14_1_search_results.py
    --ignore=tests/integration/test_story_14_2_graph_tooltips.py
    --ignore=tests/workers/

# Show warnings but don't fail on them
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning
