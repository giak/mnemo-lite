x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: mnemo-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mnemo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mnemopass}
      POSTGRES_DB: ${POSTGRES_DB:-mnemolite}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/scripts:/app/scripts:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mnemo} -d $${POSTGRES_DB:-mnemolite} -q"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      postgres
        -c shared_buffers=1GB
        -c effective_cache_size=3GB
        -c maintenance_work_mem=256MB
        -c work_mem=32MB
        -c max_parallel_workers_per_gather=2
    shm_size: 1g
    networks:
      backend:
        aliases:
          - db
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: mnemo-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      backend:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mnemo-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-8001}:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-mnemo}:${POSTGRES_PASSWORD:-mnemopass}@db:5432/${POSTGRES_DB:-mnemolite}"
      TEST_DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-mnemo}:${POSTGRES_PASSWORD:-mnemopass}@db:5432/mnemolite_test"
      REDIS_URL: "redis://redis:6379/0"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      CODE_EMBEDDING_MODEL: ${CODE_EMBEDDING_MODEL:-jinaai/jina-embeddings-v2-base-code}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      EMBEDDING_MODE: ${EMBEDDING_MODE:-real}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CLAUDE_PROJECTS_DIR: /host/.claude/projects
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      IMPORT_HISTORICAL: ${IMPORT_HISTORICAL:-false}
      ENABLE_AUTO_IMPORT: ${ENABLE_AUTO_IMPORT:-false}
      OTLP_ENDPOINT: http://openobserve:5080/api/default/v1/traces
      OTLP_METRICS_ENDPOINT: http://openobserve:5080/api/default/v1/metrics
      OTLP_LOGS_ENDPOINT: http://openobserve:5080/api/default/logs/_json
      O2_USER: ${O2_USER:-admin@mnemolite.local}
      O2_PASSWORD: ${O2_PASSWORD:-Complexpass#123}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./workers:/app/workers
      - ./scripts:/app/scripts
      - ./db/migrations:/app/db/migrations:ro
      - ./tests:/app/tests
      - ./ap./api/templates:/app/templates
      - ./.claude:/app/.claude:ro
      - ${CLAUDE_PROJECTS_DIR:-/home/giak/.claude/projects}:/host/.claude/projects:ro
      - /home/giak/projects:/external/projects:ro
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 24G
        reservations:
          memory: 16G
    networks:
      backend:
      frontend:
    logging: *default-logging
    command:
      - sh
      - -c
      - |
        if [ "${ENABLE_AUTO_IMPORT:-false}" = "true" ]; then
          nohup bash /app/scripts/conversation-auto-import.sh > /tmp/daemon.log 2>&1 &
        fi
        exec uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: mnemo-worker
    restart: unless-stopped
    depends_on:
      - redis
      - api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_URL=http://api:8000
      - LOG_LEVEL=INFO
      - OTLP_ENDPOINT=http://openobserve:5080/api/default/v1/traces
      - OTLP_METRICS_ENDPOINT=http://openobserve:5080/api/default/v1/metrics
      - OTLP_LOGS_ENDPOINT=http://openobserve:5080/api/default/logs/_json
      - O2_USER=${O2_USER:-admin@mnemolite.local}
      - O2_PASSWORD=${O2_PASSWORD:-Complexpass#123}
    networks:
      - backend
    volumes:
      - ./workers:/app/workers:ro
    command: python -m workers.conversation_worker
    logging: *default-logging

  mcp:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mnemo-mcp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mnemo}:${POSTGRES_PASSWORD:-mnemopass}@db:5432/${POSTGRES_DB:-mnemolite}
      MCP_DATABASE_URL: postgresql://${POSTGRES_USER:-mnemo}:${POSTGRES_PASSWORD:-mnemopass}@db:5432/${POSTGRES_DB:-mnemolite}
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_MODE: ${EMBEDDING_MODE:-real}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      CODE_EMBEDDING_MODEL: ${CODE_EMBEDDING_MODEL:-jinaai/jina-embeddings-v2-base-code}
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "8002"
      MCP_AUTH_MODE: none
      OTLP_ENDPOINT: http://openobserve:5080/api/default/v1/traces
      OTLP_METRICS_ENDPOINT: http://openobserve:5080/api/default/v1/metrics
      OTLP_LOGS_ENDPOINT: http://openobserve:5080/api/default/logs/_json
      O2_USER: ${O2_USER:-admin@mnemolite.local}
      O2_PASSWORD: ${O2_PASSWORD:-Complexpass#123}
    ports:
      - "127.0.0.1:8002:8002"
    networks:
      - backend
    volumes:
      - ./api:/app
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8002)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    command: python3 -u -m mnemo_mcp.server
    logging: *default-logging

  # Frontend — Vite dev server (HMR) — dev profile only
  # Accessible at http://localhost:3000
  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: mnemo-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      VITE_API_URL: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - frontend
    logging: *default-logging

  # Frontend — Nginx production build — prod profile only
  # Built with `npm run build`, served by Nginx
  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://api:8000}
    container_name: mnemo-frontend-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - api
    networks:
      - frontend
    logging: *default-logging

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: mnemo-openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@mnemolite.local
      - ZO_ROOT_USER_PASSWORD=Complexpass#123
      - ZO_DATA_DIR=/data
      - ZO_INGEST_ALLOWED_IPS=0.0.0.0/0
      - ZO_HTTP_PORT=5080
    volumes:
      - openobserve_data:/data
    networks:
      - frontend
      - backend
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  openobserve_data:
  hf_cache:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
